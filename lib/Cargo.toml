[package]
authors = ["Joep Meindertsma <joep@argu.co>"]
description = "Library for creating, storing, querying, validating and converting Atomic Data."
edition = "2021"
license = "MIT"
name = "atomic_lib"
readme = "README.md"
repository = "https://github.com/atomicdata-dev/atomic-server"
version = "0.40.0"


[dependencies]
base64 = "0.21"
rmp-serde = { version = "1.3.0", optional = true }
# Needed for migration to messagepack
bincode1 = { package = "bincode", version = "1", optional = true }
directories = { version = ">= 2, < 5", optional = true }
rand = { version = "0.8" }
regex = "1"
hex = "0.4"
ring = "0.17.14"
rio_api = { version = "0.8", optional = true }
rio_turtle = { version = "0.8", optional = true }
serde = { version = "1", features = ["derive"] }
serde_jcs = "0.1.0"
serde_json = "1"
sled = { version = "0.34", optional = true, features = ["no_logs"] }
toml = { version = "0.8", optional = true }
tracing = "0.1"
reqwest = { version = "0.12", features = ["rustls-tls"] }
url = "2"
urlencoding = "2"
ulid = "1.1.3"
yrs = "0.24.0"
tokio = { version = "1", features = [
  "rt",
  "macros",
  "sync",
  "rt-multi-thread",
] }
async-trait = "0.1.89"
futures = "0.3.31"

[dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }
iai = "0.1"
lazy_static = "1"
ntest = "0.9"

[features]
config = ["directories", "toml"]
db = ["sled", "rmp-serde", "bincode1"]
rdf = ["rio_api", "rio_turtle"]
