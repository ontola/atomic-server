[package]
authors = ["Joep Meindertsma <joep@argu.co>"]
description = "Library for creating, storing, querying, validating and converting Atomic Data."
edition = "2021"
license = "MIT"
name = "atomic_lib"
readme = "README.md"
repository = "https://github.com/atomicdata-dev/atomic-server"
version = "0.40.0"

# Enables benchmarks to use the features, such as Db
[[bench]]
harness = false
name = "benchmarks"
# path = "benches/benchmarks.rs"

[dependencies]
base64 = "0.21"
rmp-serde = { version = "1.3.0", optional = true }
# Needed for migration to messagepack
bincode1 = { package = "bincode", version = "1", optional = true }
directories = { version = ">= 2, < 5", optional = true }
html2md = { version = "0.2.14", optional = true }
kuchikiki = { version = "0.8.2", optional = true }
lol_html = { version = "1", optional = true }
rand = { version = "0.8" }
regex = "1"
ring = "0.17.6"
parking_lot = "0.12"
strsim = "0.11"
rio_api = { version = "0.8", optional = true }
rio_turtle = { version = "0.8", optional = true }
serde = { version = "1", features = ["derive"] }
fst = { version = "0.4", optional = true }
ahash = { version = "0.8", optional = true }
lru = { version = "0.12", optional = true }
memmap2 = { version = "0.9", optional = true }
terraphim_automata = { path = "../../terraphim-ai/crates/terraphim_automata", optional = true }
terraphim_types = { path = "../../terraphim-ai/crates/terraphim_types", optional = true }
serde_jcs = "0.1.0"
serde_json = "1"
rusqlite = { version = "0.37", optional = true, features = [
    "bundled",
    "backup",
    "modern_sqlite",
] }
r2d2 = { version = "0.8", optional = true }
r2d2_sqlite = { version = "0.31", optional = true }
sled = { version = "0.34", optional = true, features = ["no_logs"] }
toml = { version = "0.8", optional = true }
tracing = "0.1"
ureq = "2"
url = "2"
urlencoding = "2"
ulid = "1.1.3"

[dev-dependencies]
criterion = "0.5"
iai = "0.1"
lazy_static = "1"
ntest = "0.9"
tempfile = "3"

[features]
config = ["directories", "toml"]
db = ["rusqlite", "r2d2", "r2d2_sqlite", "sled", "rmp-serde", "bincode1", "fst", "ahash", "lru", "memmap2"]
terraphim-search = ["terraphim_automata", "terraphim_types"]
html = ["kuchikiki", "lol_html", "html2md"]
rdf = ["rio_api", "rio_turtle"]
