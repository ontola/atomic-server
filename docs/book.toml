[build]
build-dir = "build"

[book]
title = "Atomic Data Docs"
authors = ["Joep Meindertsma"]
description = "Documentation for the Atomic Data standard."
language = "en"

[output.html]
git-repository-icon = "fab-github"
git-repository-url = "https://github.com/atomicdata-dev/atomic-server"
edit-url-template = "https://github.com/atomicdata-dev/atomic-server/edit/develop/docs/{path}"
additional-js = ["discord.js"]

[output.html.fold]
enable = true
level = 2
